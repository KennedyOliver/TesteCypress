name: Cypress Tests

on:
  workflow_dispatch:  # permite rodar manualmente
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'   # habilita cache automático de dependências

      - name: Install dependencies
        run: npm ci     # usa lockfile para builds consistentes

      - name: Run Cypress
        run: npm run cypress:run